<main class="login-shell">
  <section class="login-container">
    <div class="login-header">
      <a class="home-link" routerLink="/home">← Retour à l'accueil</a>
      <h1>Connexion</h1>
    </div>

    <div class="login-card">
      <div class="card-header">
        <span class="pill">Connexion securisee</span>
        <h2>Se connecter</h2>
        <p>Choisissez votre espace puis entrez vos identifiants.</p>
      </div>

      <div class="user-type-toggle" role="tablist" aria-label="Type d'utilisateur">
        <button
          type="button"
          class="toggle-btn"
          [class.active]="selectedUserType === UserType.PATIENT"
          (click)="setUserType(UserType.PATIENT)"
          [disabled]="isLoading"
        >
          Patient
        </button>
        <button
          type="button"
          class="toggle-btn"
          [class.active]="selectedUserType === UserType.MEDICAL_STAFF"
          (click)="setUserType(UserType.MEDICAL_STAFF)"
          [disabled]="isLoading"
        >
          Personnel medical
        </button>
      </div>

      <form (ngSubmit)="login()" class="login-form" novalidate>
        <label class="field" *ngIf="selectedUserType === UserType.PATIENT">
          <span>Telephone</span>
          <input
            class="input"
            type="text"
            [(ngModel)]="credentials.telephone"
            name="telephone"
            autocomplete="tel"
            placeholder="0612345678"
            required
            [disabled]="isLoading"
          >
        </label>

        <label class="field" *ngIf="selectedUserType === UserType.PATIENT">
          <span>Mot de passe</span>
          <input
            class="input"
            type="password"
            [(ngModel)]="credentials.password"
            name="password"
            autocomplete="current-password"
            placeholder="Votre mot de passe"
            required
            [disabled]="isLoading"
          >
        </label>

        <label class="field" *ngIf="selectedUserType === UserType.MEDICAL_STAFF">
          <span>Code d'acces</span>
          <input
            class="input"
            type="text"
            [(ngModel)]="credentials.accessCode"
            name="accessCode"
            autocomplete="off"
            placeholder="AC-TEST-001"
            required
            [disabled]="isLoading"
          >
        </label>

        <button class="btn-primary" type="submit" [disabled]="isLoading">
          {{ isLoading ? 'Connexion...' : 'Se connecter' }}
        </button>

        <div
          class="alert"
          [class.alert-error]="messageType === 'error'"
          [class.alert-success]="messageType === 'success'"
          *ngIf="message"
          role="alert"
        >
          {{ message }}
        </div>
      </form>

      <a class="forgot-link" href="mailto:contact@opticlinic.local">Mot de passe oublié ?</a>
      <a
        class="forgot-link"
        routerLink="/register"
        [queryParams]="returnUrl ? { returnUrl: returnUrl } : null"
      >
        Pas de compte ? S'inscrire
      </a>
    </div>
  </section>
</main>

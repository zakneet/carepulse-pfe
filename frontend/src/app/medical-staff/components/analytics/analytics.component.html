<div class="ana-wrap">
  <div class="ana-header">
    <div><p class="ana-eyebrow">ANALYTICS</p><h1 class="ana-title">Performance overview</h1><p class="ana-subtitle">Monthly insights for your practice.</p></div>
    <button class="ana-export-btn">Export report →</button>
  </div>
  <!-- KPI strip -->
  <div class="ana-kpi-grid">
    <div *ngFor="let k of kpis" class="ana-kpi-card">
      <div class="ana-kpi-label">{{ k.label }}</div>
      <div class="ana-kpi-value">{{ k.value }}</div>
      <div class="ana-kpi-trend" [ngClass]="'ana-trend--' + k.color">{{ k.trend }} vs last month</div>
    </div>
  </div>
  <!-- Bar chart -->
  <div class="ana-card">
    <h2 class="ana-card-title">Monthly appointments · 2025</h2>
    <div class="ana-bar-chart">
      <div *ngFor="let val of monthlyData; let i = index" class="ana-bar-col">
        <div class="ana-bar-fill" [style.height]="(val / maxBar * 100) + '%'"></div>
        <div class="ana-bar-label">{{ months[i] }}</div>
      </div>
    </div>
  </div>
</div>

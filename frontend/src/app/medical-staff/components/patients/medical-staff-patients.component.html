<section class="panel">
  <div class="section-nav">
    <a [routerLink]="[baseRoute, 'form']" class="nav-chip">Formulaire</a>
    <a [routerLink]="[baseRoute, 'planning']" class="nav-chip">Planning</a>
    <a [routerLink]="[baseRoute, 'patients']" class="nav-chip active">Patients</a>
  </div>

  <div class="list-header">
    <div>
      <h3>Patients suivis</h3>
      <p class="muted" *ngIf="!loading && !errorMessage">{{ patients.length }} patient(s)</p>
    </div>
  </div>

  <p class="muted" *ngIf="loading">Chargement des patients...</p>
  <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

  <div class="patients-table" *ngIf="!loading && !errorMessage && patients.length > 0">
    <div class="table-head row">
      <span>Patient</span>
      <span>Contact</span>
      <span>Rendez-vous</span>
      <span>Action</span>
    </div>

    <article class="row patient-row" *ngFor="let p of patients">
      <div class="cell patient-name">
        <h4>{{ p.prenom }} {{ p.nom }}</h4>
        <p class="muted">ID: {{ p.id }}</p>
      </div>

      <div class="cell contact-cell">
        <p>{{ p.email || '-' }}</p>
        <p>{{ p.telephone || '-' }}</p>
      </div>

      <div class="cell rdv-count">
        <strong>{{ p.rdvCount }}</strong>
      </div>

      <div class="cell action-cell">
        <button type="button" class="profile-btn" (click)="openPatientProfile(p.id)">Voir profil</button>
      </div>
    </article>
  </div>

  <p class="muted empty-state" *ngIf="!loading && !errorMessage && patients.length === 0">Aucun patient trouve.</p>
</section>

<div class="min-h-screen bg-[#F8FAFC] text-slate-800 font-sans flex flex-col items-center justify-center relative overflow-hidden">
  
  <!-- Modern Tech Grid Background -->
  <div class="absolute inset-0 bg-[linear-gradient(to_right,#80808012_1px,transparent_1px),linear-gradient(to_bottom,#80808012_1px,transparent_1px)] bg-[size:24px_24px] pointer-events-none z-0"></div>

  <!-- Ambient Light Blobs -->
  <div class="absolute inset-0 z-0 pointer-events-none overflow-hidden">
    <div class="absolute top-[-10%] left-[20%] w-[40%] h-[40%] rounded-full bg-[#0284c7]/10 blur-[120px] animate-blob"></div>
    <div class="absolute bottom-[10%] right-[10%] w-[30%] h-[30%] rounded-full bg-[#38bdf8]/15 blur-[100px] animate-blob animation-delay-2000"></div>
  </div>

  <div class="w-full max-w-md relative z-10 px-4">
    <!-- Header -->
    <div class="text-center mb-10">
      <a routerLink="/home" class="inline-flex items-center gap-3 mb-6 cursor-pointer group">
        <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-[#0284c7] to-[#38bdf8] flex items-center justify-center text-white font-bold shadow-lg shadow-[#0284c7]/30 group-hover:scale-105 transition-transform">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
        </div>
        <div class="text-left">
          <h2 class="text-2xl font-extrabold text-slate-900 tracking-tight leading-none">OptiClinic</h2>
          <span class="text-[12px] font-bold text-[#0284c7] uppercase tracking-wider">Espace médical</span>
        </div>
      </a>
      
      <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight mb-3">Portail médical</h1>
      <p class="text-slate-500 font-medium">Veuillez saisir votre code d'accès sécurisé pour accéder à votre espace clinique.</p>
    </div>

    <!-- Login Card -->
    <div class="bg-white/80 backdrop-blur-xl p-8 sm:p-10 rounded-[2rem] border border-white shadow-[0_20px_50px_-12px_rgba(0,0,0,0.1)] relative">
      <form (ngSubmit)="authenticate()" class="flex flex-col gap-6">
        
        <div *ngIf="errorMessage" class="bg-red-50 text-red-600 px-4 py-3 rounded-2xl text-sm font-bold border border-red-100 flex items-center justify-center gap-2 animate-bounce">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>
          {{ errorMessage }}
        </div>

        <div class="flex flex-col gap-2">
          <label class="text-sm font-bold text-slate-700 ml-2">Code d'accès personnel</label>
          <div class="relative group">
            <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-[#0284c7] transition-colors">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </div>
            <input 
              type="password" 
              name="accessCode"
              [(ngModel)]="accessCode"
              class="w-full h-14 pl-12 pr-4 bg-slate-50/50 hover:bg-slate-100/50 focus:bg-white rounded-2xl border-none ring-1 ring-slate-200 focus:ring-2 focus:ring-[#0284c7] transition-all text-slate-900 placeholder:text-slate-400 font-bold tracking-[0.25em] text-center text-lg" 
              placeholder="••••••••"
              autocomplete="off"
              [disabled]="isLoading"
            >
          </div>
        </div>

        <button 
          type="submit" 
          class="h-14 mt-2 w-full bg-[#0284c7] hover:bg-[#0369a1] disabled:bg-slate-300 disabled:cursor-not-allowed text-white rounded-2xl font-bold transition-all flex items-center justify-center gap-2 shadow-lg shadow-[#0284c7]/30 group"
          [disabled]="isLoading || !accessCode"
        >
          <span>{{ isLoading ? 'Vérification...' : "Accéder à l'espace médical" }}</span>
          <svg *ngIf="!isLoading" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="group-hover:translate-x-1 transition-transform"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
          <svg *ngIf="isLoading" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="animate-spin"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
        </button>
      </form>
    </div>

    <div class="text-center mt-10">
      <a routerLink="/home" class="inline-flex items-center gap-2 text-sm font-bold text-slate-500 hover:text-slate-900 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        Retour à l'accueil
      </a>
    </div>
  </div>
</div>
